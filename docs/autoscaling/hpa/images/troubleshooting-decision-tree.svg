<svg viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-start" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-decision" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-fix-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-fix-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffde7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff59d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-fix-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef9a9a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-fix-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81d4fa;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1100" height="700" fill="url(#grad-bg)" rx="10"/>
  
  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#333">
    HPA 故障排查决策树
  </text>
  <text x="550" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666">
    按步骤逐步排查，快速定位问题
  </text>
  
  <!-- Start Node -->
  <g transform="translate(475, 65)" filter="url(#shadow)">
    <rect width="150" height="45" rx="22" fill="url(#grad-start)" stroke="#1976d2" stroke-width="2"/>
    <text x="75" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">🔍 开始排查</text>
  </g>
  
  <!-- Arrow to first decision -->
  <path d="M 550 110 L 550 130" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Decision 1: HPA生效？ -->
  <g transform="translate(425, 140)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#e65100">HPA生效?</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">扩缩容正常?</text>
  </g>
  
  <!-- No branch: Check HPA exists -->
  <path d="M 425 175 L 350 175 L 350 215" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="365" y="170" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(275, 220)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#e65100">HPA对象存在?</text>
  </g>
  
  <!-- No: Create HPA -->
  <path d="M 275 255 L 200 255 L 200 295" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="220" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(125, 300)" filter="url(#shadow)">
    <rect width="150" height="60" rx="8" fill="url(#grad-fix-green)" stroke="#4caf50" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">✅ Fix1: 创建HPA</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">kubectl apply -f</text>
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">hpa.yaml</text>
  </g>
  
  <!-- Yes: Check Metrics Server -->
  <path d="M 425 255 L 500 255 L 500 295" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="485" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(425, 300)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">Metrics Server</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e65100">运行正常?</text>
  </g>
  
  <!-- No: Fix Metrics Server -->
  <path d="M 425 335 L 350 335 L 350 375" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="365" y="370" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(275, 380)" filter="url(#shadow)">
    <rect width="150" height="75" rx="8" fill="url(#grad-fix-green)" stroke="#4caf50" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">✅ Fix2: 修复Metrics</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">kubectl get pods</text>
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">-n kube-system |</text>
    <text x="75" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">grep metrics-server</text>
  </g>
  
  <!-- Yes: Check resources.requests -->
  <path d="M 575 335 L 650 335 L 650 375" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="635" y="370" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(575, 380)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">Pod设置了</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">resources.requests?</text>
  </g>
  
  <!-- No: Add requests -->
  <path d="M 575 415 L 500 415 L 500 455" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="515" y="450" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(425, 460)" filter="url(#shadow)">
    <rect width="150" height="75" rx="8" fill="url(#grad-fix-green)" stroke="#4caf50" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">✅ Fix3: 添加requests</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">resources:</text>
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">requests:</text>
    <text x="75" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">cpu: 1000m</text>
  </g>
  
  <!-- Yes: Check kubectl top -->
  <path d="M 725 415 L 800 415 L 800 455" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="785" y="450" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(725, 460)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">kubectl top pods</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">能看到数据?</text>
  </g>
  
  <!-- No: Fix Kubelet connectivity -->
  <path d="M 725 495 L 650 495 L 650 535" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="665" y="530" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(575, 540)" filter="url(#shadow)">
    <rect width="150" height="60" rx="8" fill="url(#grad-fix-green)" stroke="#4caf50" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">✅ Fix4: 检查连通性</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">检查Kubelet与</text>
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">Metrics Server连通</text>
  </g>
  
  <!-- Yes: Check metrics threshold -->
  <path d="M 875 495 L 950 495 L 950 535" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="935" y="530" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(875, 540)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">指标超出目标</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">±10%?</text>
  </g>
  
  <!-- No: Wait for threshold -->
  <path d="M 875 575 L 800 575 L 800 615" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="815" y="610" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(725, 620)" filter="url(#shadow)">
    <rect width="150" height="60" rx="8" fill="url(#grad-fix-yellow)" stroke="#ffc107" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#f57f17">⏳ Fix5: 等待触发</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">指标在容忍范围内</text>
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">等待触发条件</text>
  </g>
  
  <!-- Yes branch from Decision 1 (HPA working but flapping) -->
  <path d="M 575 175 L 650 175 L 650 215" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="635" y="170" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(575, 220)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#e65100">频繁扩缩容?</text>
    <text x="75" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">(抖动)</text>
  </g>
  
  <!-- No flapping: Working normally -->
  <path d="M 725 255 L 800 255 L 800 295" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="785" y="290" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(725, 300)" filter="url(#shadow)">
    <rect width="150" height="50" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">✅ HPA工作正常!</text>
    <text x="75" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#388e3c">无需修复</text>
  </g>
  
  <!-- Yes flapping: Fix stabilization -->
  <path d="M 575 290 L 500 290 L 500 330" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="515" y="325" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(425, 335)" filter="url(#shadow)">
    <rect width="150" height="90" rx="8" fill="url(#grad-fix-yellow)" stroke="#ffc107" stroke-width="2"/>
    <text x="75" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#f57f17">⚠️ Fix: 防抖调优</text>
    <text x="75" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">延长stabilization</text>
    <text x="75" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">Window至5-10分钟</text>
    <text x="75" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">降低policies.value</text>
  </g>
  
  <!-- Additional decision nodes for the threshold branch -->
  <!-- Yes from threshold: Check cooldown -->
  <g transform="translate(875, 620)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">在冷却期?</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">扩容3min/缩容5min</text>
  </g>
  
  <!-- Yes: Wait for cooldown -->
  <path d="M 875 690 L 950 690 L 950 705 L 200 705 L 200 375" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <g transform="translate(50, 620)" filter="url(#shadow)">
    <rect width="140" height="60" rx="8" fill="url(#grad-fix-yellow)" stroke="#ffc107" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#f57f17">⏳ Fix6: 等待</text>
    <text x="70" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">等待冷却期结束</text>
    <text x="70" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">扩容:3min 缩容:5min</text>
  </g>
  
  <!-- No from cooldown: Check maxReplicas -->
  <g transform="translate(200, 540)" filter="url(#shadow)">
    <polygon points="75,0 150,35 75,70 0,35" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#e65100">达到maxReplicas?</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">已达到上限?</text>
  </g>
  
  <!-- Yes: Increase maxReplicas -->
  <path d="M 200 575 L 125 575 L 125 615" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="140" y="610" font-family="system-ui, sans-serif" font-size="9" fill="#666">是</text>
  
  <g transform="translate(50, 540)" filter="url(#shadow)">
    <rect width="140" height="60" rx="8" fill="url(#grad-fix-red)" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#c62828">⚠️ Fix7: 提高上限</text>
    <text x="70" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">提高maxReplicas</text>
    <text x="70" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">或增加节点容量</text>
  </g>
  
  <!-- No: Check events -->
  <path d="M 350 575 L 425 575 L 425 615" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="410" y="610" font-family="system-ui, sans-serif" font-size="9" fill="#666">否</text>
  
  <g transform="translate(350, 620)" filter="url(#shadow)">
    <rect width="150" height="60" rx="8" fill="url(#grad-fix-blue)" stroke="#2196f3" stroke-width="2"/>
    <text x="75" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1565c0">🔍 Fix8: 检查事件</text>
    <text x="75" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">kubectl describe hpa</text>
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">查看详细日志</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 10)">
    <rect width="300" height="40" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="150" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333">图例</text>
    <g transform="translate(10, 18)">
      <polygon points="10,0 20,8 10,16 0,8" fill="url(#grad-decision)" stroke="#f57c00" stroke-width="1"/>
      <text x="28" y="10" font-family="system-ui, sans-serif" font-size="8" fill="#666">判断节点</text>
    </g>
    <g transform="translate(80, 18)">
      <rect width="15" height="12" rx="3" fill="url(#grad-fix-green)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="8" fill="#666">修复步骤</text>
    </g>
    <g transform="translate(150, 18)">
      <rect width="15" height="12" rx="3" fill="url(#grad-fix-yellow)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="8" fill="#666">等待/调优</text>
    </g>
    <g transform="translate(220, 18)">
      <rect width="15" height="12" rx="3" fill="url(#grad-fix-red)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="8" fill="#666">容量问题</text>
    </g>
  </g>
</svg>
