<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-user" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-cpu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-hpa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-calc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-pod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-lb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80cbc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-success" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81c784;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="400" fill="url(#grad-bg)" rx="10"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#333">
    HPA 工作流程概览
  </text>
  
  <!-- Step 1: User Request -->
  <g transform="translate(30, 70)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-user)" stroke="#1976d2" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">👥 用户请求</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">请求量增加</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d32f2f">⬆️ 激增中!</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 145 110 L 175 110" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2: CPU Rising -->
  <g transform="translate(180, 70)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-cpu)" stroke="#ef6c00" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#e65100">📈 CPU上升</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">Pod CPU</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d32f2f" font-weight="bold">使用率: 80%</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 295 110 L 325 110" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 3: HPA Detection -->
  <g transform="translate(330, 70)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-hpa)" stroke="#f57c00" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#e65100">🤖 HPA检测</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">实际值 vs</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">目标值比较</text>
  </g>
  
  <!-- Decision Diamond -->
  <g transform="translate(445, 60)">
    <polygon points="55,0 110,50 55,100 0,50" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#e65100">超过</text>
    <text x="55" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#e65100">目标?</text>
    <text x="60" y="18" font-family="system-ui, sans-serif" font-size="9" fill="#4caf50">是</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 500 110 L 530 110" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Calculate -->
  <g transform="translate(535, 70)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-calc)" stroke="#7b1fa2" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#4a148c">🧮 计算</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">理想副本数</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6a1b9a" font-weight="bold">3 → 5</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 650 110 L 680 110" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 5: Create Pod -->
  <g transform="translate(685, 70)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-pod)" stroke="#388e3c" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">🚀 创建Pod</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">新Pod启动</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4caf50" font-weight="bold">+2个副本</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 745 150 L 745 170" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 6: Load Balance -->
  <g transform="translate(685, 180)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-lb)" stroke="#00796b" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#00695c">⚖️ 负载均衡</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">流量分配到</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">所有Pod</text>
  </g>
  
  <!-- Arrow 6 -->
  <path d="M 685 220 L 655 220" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 7: Success -->
  <g transform="translate(535, 180)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="url(#grad-success)" stroke="#2e7d32" stroke-width="2"/>
    <text x="55" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1b5e20">✅ 完成</text>
    <text x="55" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#424242">CPU使用率</text>
    <text x="55" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2e7d32" font-weight="bold">降至目标范围</text>
  </g>
  
  <!-- Back Arrow (feedback loop) -->
  <path d="M 590 180 Q 590 150 590 150" stroke="#4caf50" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  
  <!-- Formula Box -->
  <g transform="translate(30, 280)">
    <rect width="840" height="90" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="420" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#333">
      📐 核心计算公式
    </text>
    <rect x="20" y="38" width="800" height="40" rx="4" fill="#fff3e0"/>
    <text x="420" y="63" text-anchor="middle" font-family="monospace, sans-serif" font-size="14" fill="#333">
      期望副本数 = ceil(当前副本数 × (当前指标值 / 目标指标值))
    </text>
    <text x="420" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">
      示例: ceil(3 × (80% / 50%)) = ceil(4.8) = 5 个 Pod
    </text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(30, 195)">
    <rect width="200" height="70" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="100" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#333">图例说明</text>
    <g transform="translate(10, 28)">
      <rect width="15" height="12" rx="3" fill="url(#grad-user)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">用户流量</text>
    </g>
    <g transform="translate(100, 28)">
      <rect width="15" height="12" rx="3" fill="url(#grad-hpa)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">HPA控制</text>
    </g>
    <g transform="translate(10, 48)">
      <rect width="15" height="12" rx="3" fill="url(#grad-pod)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">Pod扩缩容</text>
    </g>
    <g transform="translate(100, 48)">
      <rect width="15" height="12" rx="3" fill="url(#grad-success)"/>
      <text x="22" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">目标达成</text>
    </g>
  </g>
</svg>
