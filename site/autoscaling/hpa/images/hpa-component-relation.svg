<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-cp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-worker" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-hpa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81d4fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-api" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-metrics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-kubelet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-pod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81c784;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-user" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f48fb1;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f57c00"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7b1fa2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="url(#grad-bg)" rx="10"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#333">
    HPA 架构全景 - 核心组件关系
  </text>
  <text x="500" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666">
    超市收银柜台类比
  </text>
  
  <!-- Control Plane Box -->
  <rect x="50" y="75" width="400" height="180" rx="10" fill="url(#grad-cp)" stroke="#1976d2" stroke-width="2"/>
  <text x="250" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">
    🎛️ 控制平面 (Control Plane) - 超市总部
  </text>
  
  <!-- HPA Controller -->
  <g transform="translate(70, 115)" filter="url(#shadow)">
    <rect width="160" height="120" rx="8" fill="url(#grad-hpa)" stroke="#0288d1" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#01579b">HPA Controller</text>
    <text x="80" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0277bd">超市店长</text>
    <text x="80" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">决策中枢</text>
    <rect x="10" y="80" width="140" height="30" rx="4" fill="#fff" stroke="#81d4fa" stroke-width="1"/>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">每15秒查询指标</text>
  </g>
  
  <!-- API Server -->
  <g transform="translate(260, 115)" filter="url(#shadow)">
    <rect width="170" height="120" rx="8" fill="url(#grad-api)" stroke="#7b1fa2" stroke-width="2"/>
    <text x="85" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4a148c">API Server</text>
    <text x="85" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6a1b9a">总部调度系统</text>
    <text x="85" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">协调Pod创建/删除</text>
    <rect x="15" y="80" width="140" height="30" rx="4" fill="#fff" stroke="#ce93d8" stroke-width="1"/>
    <text x="85" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">接收HPA指令</text>
  </g>
  
  <!-- Worker Nodes Box -->
  <rect x="50" y="275" width="900" height="380" rx="10" fill="url(#grad-worker)" stroke="#7b1fa2" stroke-width="2"/>
  <text x="500" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">
    🖥️ 工作节点 (Worker Nodes) - 超市门店
  </text>
  
  <!-- Metrics Server -->
  <g transform="translate(470" y="115")" filter="url(#shadow)">
    <rect x="470" y="115" width="160" height="120" rx="8" fill="url(#grad-metrics)" stroke="#ef6c00" stroke-width="2"/>
    <text x="550" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Metrics Server</text>
    <text x="550" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ef6c00">店员统计员</text>
    <text x="550" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">采集资源指标</text>
    <rect x="480" y="195" width="140" height="30" rx="4" fill="#fff" stroke="#ffb74d" stroke-width="1"/>
    <text x="550" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#333">聚合计算平均值</text>
  </g>
  
  <!-- Node 1 -->
  <rect x="70" y="325" width="400" height="150" rx="8" fill="#fff" stroke="#42a5f5" stroke-width="2"/>
  <text x="270" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">📦 Node 1 - 收银区A</text>
  
  <!-- Kubelet Node 1 -->
  <g transform="translate(90, 365)" filter="url(#shadow)">
    <circle r="30" fill="url(#grad-kubelet)" stroke="#388e3c" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Kubelet</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">收银员</text>
  </g>
  
  <!-- Pods Node 1 -->
  <g transform="translate(140, 355)">
    <g transform="translate(0, 0)">
      <rect width="100" height="90" rx="6" fill="url(#grad-pod)" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
      <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Pod 1</text>
      <text x="50" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#388e3c">推理服务</text>
      <text x="50" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">收银台1</text>
      <rect x="10" y="68" width="80" height="15" rx="3" fill="#fff3e0"/>
      <text x="50" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e65100" font-weight="bold">CPU: 80%</text>
    </g>
    <g transform="translate(115, 0)">
      <rect width="100" height="90" rx="6" fill="url(#grad-pod)" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
      <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Pod 2</text>
      <text x="50" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#388e3c">推理服务</text>
      <text x="50" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">收银台2</text>
      <rect x="10" y="68" width="80" height="15" rx="3" fill="#fff3e0"/>
      <text x="50" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e65100" font-weight="bold">CPU: 85%</text>
    </g>
    <g transform="translate(230, 0)">
      <rect width="100" height="90" rx="6" fill="url(#grad-pod)" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
      <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Pod 3</text>
      <text x="50" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#388e3c">推理服务</text>
      <text x="50" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">收银台3</text>
      <rect x="10" y="68" width="80" height="15" rx="3" fill="#fff3e0"/>
      <text x="50" y="79" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e65100" font-weight="bold">CPU: 75%</text>
    </g>
  </g>
  
  <!-- Node 2 -->
  <rect x="500" y="325" width="420" height="150" rx="8" fill="#fff" stroke="#42a5f5" stroke-width="2"/>
  <text x="710" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">📦 Node 2 - 收银区B</text>
  
  <!-- Kubelet Node 2 -->
  <g transform="translate(530, 365)" filter="url(#shadow)">
    <circle r="30" fill="url(#grad-kubelet)" stroke="#388e3c" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Kubelet</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">收银员</text>
  </g>
  
  <!-- New Pods (dashed) -->
  <g transform="translate(580, 355)">
    <g transform="translate(0, 0)">
      <rect width="100" height="90" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3" filter="url(#shadow)"/>
      <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Pod 4</text>
      <text x="50" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#388e3c">新收银台</text>
      <text x="50" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">创建中...</text>
      <text x="50" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4caf50">⏳</text>
    </g>
    <g transform="translate(115, 0)">
      <rect width="100" height="90" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3" filter="url(#shadow)"/>
      <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Pod 5</text>
      <text x="50" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#388e3c">新收银台</text>
      <text x="50" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">创建中...</text>
      <text x="50" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4caf50">⏳</text>
    </g>
    <g transform="translate(230, 20)">
      <rect width="80" height="50" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="40" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">...</text>
      <text x="40" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#999">最多10台</text>
    </g>
  </g>
  
  <!-- User/SRE -->
  <g transform="translate("70")" filter="url(#shadow)">
    <rect x="70" y="490" width="180" height="130" rx="8" fill="url(#grad-user)" stroke="#e91e63" stroke-width="2"/>
    <text x="160" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#c2185b">👤 用户/SRE</text>
    <text x="160" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ad1457">超市老板/区域经理</text>
    <rect x="85" y="555" width="150" height="55" rx="4" fill="#fff" stroke="#f48fb1" stroke-width="1"/>
    <text x="160" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#333">1. 创建HPA配置</text>
    <text x="160" y="590" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#333">target: 50% CPU</text>
    <text x="160" y="605" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#333">min: 3, max: 10</text>
  </g>
  
  <!-- Flow Arrows with Labels -->
  <!-- 1. User to API Server -->
  <path d="M 160 490 L 160 235 L 260 235" stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="230" font-family="system-ui, sans-serif" font-size="9" fill="#c2185b">① 创建HPA配置</text>
  
  <!-- 2. Kubelet to Metrics Server -->
  <path d="M 120 395 L 120 270 L 470 270 L 470 235" stroke="#f57c00" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="200" y="265" font-family="system-ui, sans-serif" font-size="9" fill="#ef6c00">② 采集容器指标</text>
  
  <path d="M 560 395 L 560 270 L 560 270 L 560 235" stroke="#f57c00" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  
  <!-- 3. HPA to Metrics Server -->
  <path d="M 230 175 L 400 175 L 400 175 L 470 175" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="330" y="170" font-family="system-ui, sans-serif" font-size="9" fill="#1976d2">③ 每15s查询指标</text>
  
  <!-- 4. HPA Calculation -->
  <g transform="translate(85, 210)">
    <rect width="130" height="40" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="65" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#e65100">④ 计算期望副本数</text>
    <text x="65" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#333" font-weight="bold">3 → 5</text>
  </g>
  
  <!-- 5. HPA to API Server -->
  <path d="M 230 175 L 260 175" stroke="#7b1fa2" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="245" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#7b1fa2">⑤ 更新Deployment</text>
  
  <!-- 6. API Server to Pods -->
  <path d="M 345 235 L 345 300 L 320 300 L 320 325" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="380" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#388e3c">⑥ 调度Pod</text>
  
  <path d="M 345 300 L 690 300 L 690 325" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  
  <!-- Legend -->
  <g transform="translate(280, 500)">
    <rect width="320" height="120" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="160" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#333">组件职责表</text>
    
    <g transform="translate(10, 35)">
      <rect width="12" height="12" rx="2" fill="url(#grad-hpa)"/>
      <text x="20" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#333" font-weight="bold">HPA Controller</text>
      <text x="120" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">- 店长: 决策中枢</text>
    </g>
    
    <g transform="translate(10, 52)">
      <rect width="12" height="12" rx="2" fill="url(#grad-metrics)"/>
      <text x="20" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#333" font-weight="bold">Metrics Server</text>
      <text x="120" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">- 统计员: 采集指标</text>
    </g>
    
    <g transform="translate(10, 69)">
      <rect width="12" height="12" rx="2" fill="url(#grad-kubelet)"/>
      <text x="20" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#333" font-weight="bold">Kubelet</text>
      <text x="120" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">- 收银员: 暴露指标</text>
    </g>
    
    <g transform="translate(10, 86)">
      <rect width="12" height="12" rx="2" fill="url(#grad-api)"/>
      <text x="20" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#333" font-weight="bold">API Server</text>
      <text x="120" y="10" font-family="system-ui, sans-serif" font-size="9" fill="#666">- 调度系统</text>
    </g>
  </g>
  
  <!-- Workflow Steps Summary -->
  <g transform="translate(620, 490)">
    <rect width="310" height="150" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="155" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#333">工作流程</text>
    
    <text x="10" y="42" font-family="system-ui, sans-serif" font-size="9" fill="#666">① 用户创建HPA配置 (目标CPU: 50%)</text>
    <text x="10" y="58" font-family="system-ui, sans-serif" font-size="9" fill="#666">② Kubelet采集容器指标 → Metrics Server</text>
    <text x="10" y="74" font-family="system-ui, sans-serif" font-size="9" fill="#666">③ HPA每15秒查询当前CPU使用率</text>
    <text x="10" y="90" font-family="system-ui, sans-serif" font-size="9" fill="#666">④ 计算期望副本数: ceil(3 × 80%/50%) = 5</text>
    <text x="10" y="106" font-family="system-ui, sans-serif" font-size="9" fill="#666">⑤ HPA更新Deployment.replicas为5</text>
    <text x="10" y="122" font-family="system-ui, sans-serif" font-size="9" fill="#666">⑥ API Server调度创建2个新Pod</text>
    <text x="10" y="138" font-family="system-ui, sans-serif" font-size="9" fill="#4caf50">✓ 扩容完成, CPU降至48%</text>
  </g>
</svg>
